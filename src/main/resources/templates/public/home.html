<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout/public :: layout(~{::content}, 'Home')">

<div th:fragment="content">
  <div class="p-5 mb-5 rounded-4 shadow-sm bg-light border-0 position-relative overflow-hidden">
    <div class="row align-items-center">
      <div class="col-md-8">
        <h1 class="display-5 fw-bold text-dark mb-3">🍽 Welcome to Restaurant</h1>
        <p class="fs-5 text-muted mb-4">
          Đăng nhập để đặt bàn nhanh chóng.
        </p>
        <a href="/login" class="btn btn-primary btn-lg px-5 rounded-pill shadow-sm">
          🪑 Đặt bàn ngay
        </a>
      </div>
    </div>
  </div>

  <div class="container-fluid px-0">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h3 class="fw-bold m-0 text-uppercase letter-spacing-1">🍔 Thực Đơn Đặc Sắc</h3>
      <span class="badge bg-soft-primary text-primary px-3 py-2 rounded-pill">Món mới mỗi ngày</span>
    </div>

    <div class="row g-4">
      <div class="col-xl-3 col-lg-4 col-md-6 col-sm-6" th:each="f : ${foods}">
        <div class="card h-100 border-0 shadow-sm transition-hover food-card rounded-4">
          <div class="position-relative overflow-hidden rounded-t-4">
            <img th:src="@{'/images/' + ${f.image_url}}"
                 class="card-img-top food-image"
                 alt="Food Image"
                 style="height:220px; object-fit:cover">
            <div class="price-tag shadow-sm" th:text="${#numbers.formatDecimal(f.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'">
            </div>
          </div>

          <div class="card-body p-4 text-center">
            <h5 class="card-title fw-bold mb-2" th:text="${f.name}"></h5>
            <p class="small text-muted mb-3">Sản phẩm chất lượng cao từ đầu bếp chuyên nghiệp.</p>
            <button
                    class="btn btn-outline-dark btn-sm rounded-pill w-100"
                    onclick="window.location.href='/login'">
              Đặt ngay
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <style>
    .letter-spacing-1 { letter-spacing: 1px; }

    .transition-hover {
      transition: all 0.3s ease;
    }

    .food-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 1rem 3rem rgba(0,0,0,.1) !important;
    }

    .food-image {
      transition: transform 0.5s ease;
    }

    .food-card:hover .food-image {
      transform: scale(1.1);
    }

    .price-tag {
      position: absolute;
      bottom: 15px;
      right: 15px;
      background: rgba(255, 255, 255, 0.95);
      color: #dc3545;
      padding: 5px 15px;
      border-radius: 50px;
      font-weight: 700;
      backdrop-filter: blur(4px);
    }

    .bg-soft-primary {
      background-color: #e7f1ff;
    }

    .rounded-t-4 {
      border-top-left-radius: 1rem;
      border-top-right-radius: 1rem;
    }
  </style>
</div>
</html>
