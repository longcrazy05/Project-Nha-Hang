<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(content, title)">
<head>
  <meta charset="UTF-8">
  <title th:text="${title}">Customer</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>

    body{
        background:#f5f6fa;
    }

    .sidebar{
        width:260px;
        height:100vh;
        position:fixed;
        left:0;
        top:0;
        background:white;
        border-right:1px solid #eee;
        padding-top:20px;
    }

    .sidebar h5{
        padding-left:20px;
        margin-bottom:20px;
    }

    .sidebar a{
        display:block;
        padding:12px 20px;
        text-decoration:none;
        color:#333;
        transition:0.2s;
    }

    .sidebar a:hover{
        background:#f1f2f6;
        color:#0d6efd;
    }

    .sidebar a.active{
        background:#0d6efd;
        color:white;
    }

    .content{
        margin-left:260px;
        padding:30px;
    }

    .profile-box{
        text-align:center;
        padding:15px;
        border-bottom:1px solid #eee;
        margin-bottom:10px;
    }

    .profile-avatar{
        width:70px;
        height:70px;
        border-radius:50%;
        object-fit:cover;
    }

  </style>

</head>

<body>

<!-- Sidebar -->
<div class="sidebar">


  <h5>Customer Menu</h5>

  <a th:href="@{/customer/home/{id}(id=${customer.id})}">
    🏠 Trang chủ
  </a>

  <a th:href="@{/customer/profile/{id}(id=${customer.id})}">
    👤 Profile
  </a>

  <a th:href="@{/customer/reservations/{id}(id=${customer.id})}">
    🍽 Đặt bàn
  </a>

  <a th:href="@{/customer/orders/{id}(id=${customer.id})}">
    📄 Đơn hàng
  </a>

  <a th:href="@{/logout}" class="text-danger">
    🚪 Đăng xuất
  </a>
</div>


<!-- Content -->
<div class="content">
  <div th:replace="${content}"></div>
</div>


</body>
</html>
