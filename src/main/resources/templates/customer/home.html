<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout/customer :: layout(~{::content}, 'Home')">

<div th:fragment="content">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-color: #ff4757;
            --secondary-color: #2ed573;
        }
        body { background-color: #f1f2f6; }

        /* Menu Card */
        .food-card {
            border: none;
            transition: all 0.3s ease;
            border-radius: 20px;
            overflow: hidden;
            background: #fff;
        }
        .food-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1) !important;
        }
        .food-img-container {
            position: relative;
            overflow: hidden;
        }
        .food-img {
            height: 180px;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        .food-card:hover .food-img {
            transform: scale(1.1);
        }

        /* Quantity Input */
        .qty-control {
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #eee;
        }
        .qty-control button {
            background: #f8f9fa;
            border: none;
            width: 30px;
            transition: background 0.2s;
        }
        .qty-control button:hover { background: #e9ecef; }
        .qty-input {
            border: none;
            background: #fff;
            font-weight: bold;
            max-width: 40px;
        }

        /* Cart Sidebar */
        .sticky-sidebar {
            position: sticky;
            top: 20px;
        }
        .cart-item {
            border-bottom: 1px dashed #eee;
            padding: 10px 0;
        }
        .btn-checkout {
            background: linear-gradient(135deg, #2ed573 0%, #7bed9f 100%);
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(46, 213, 115, 0.3);
        }

        /* Table Status */
        .table-item {
            transition: all 0.2s;
            border: 1px solid #eee !important;
            cursor: default;
        }
        .table-item:hover {
            border-color: var(--primary-color) !important;
            background-color: #fff0f0 !important;
        }
    </style>

    <div class="row g-4">
        <div class="col-md-8 col-lg-9">
            <div class="card p-4 shadow-sm border-0 rounded-4">
                <div class="d-flex align-items-center mb-4">
                    <div class="bg-primary text-white rounded-3 p-2 me-3">
                        <i class="fas fa-utensils fa-lg"></i>
                    </div>
                    <h4 class="mb-0 fw-bold">Thực đơn đặc sắc</h4>
                </div>

                <div class="row g-4">
                    <div class="col-lg-3 col-md-4 col-6" th:each="f : ${foods}" th:if="${f.available == true}">
                        <div class="card h-100 food-card shadow-sm">
                            <div class="food-img-container">
                                <img th:src="@{'/images/' + ${f.image_url}}" class="card-img-top food-img" alt="Food">
                                <span class="position-absolute top-0 end-0 m-2 badge bg-white text-dark shadow-sm">
                                    <i class="fas fa-star text-warning me-1"></i>4.5
                                </span>
                            </div>

                            <div class="card-body p-3 d-flex flex-column">
                                <h6 class="fw-bold text-dark mb-1" th:text="${f.name}"></h6>
                                <p class="text-muted small mb-2 text-truncate" th:text="${f.description ?: 'Hương vị thơm ngon khó cưỡng'}"></p>

                                <div class="mt-auto">
                                    <h6 class="text-danger fw-bold mb-3"
                                        th:text="${#numbers.formatDecimal(f.price, 0, 'COMMA', 0, 'POINT')} + ' đ'"></h6>

                                    <div class="d-flex align-items-center justify-content-between gap-2">
                                        <div class="d-flex qty-control">
                                            <button type="button" th:onclick="updateInputQty('qty-[[${f.id}]]', -1)">-</button>
                                            <input type="number" class="qty-input text-center" th:id="'qty-' + ${f.id}" value="1" min="1" readonly>
                                            <button type="button" th:onclick="updateInputQty('qty-[[${f.id}]]', 1)">+</button>
                                        </div>
                                        <button class="btn btn-primary rounded-3 flex-grow-1"
                                                th:onclick="addToCart([[${f.id}]], [[${f.price}]], '[[${f.name}]]')">
                                            <i class="fas fa-cart-plus"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-4 col-lg-3">
            <div class="sticky-sidebar">
                <div class="card p-3 shadow-sm border-0 rounded-4">
                    <div class="d-flex align-items-center mb-3 text-success">
                        <i class="fas fa-shopping-basket fa-lg me-2"></i>
                        <h5 class="mb-0 fw-bold">Giỏ hàng</h5>
                    </div>

                    <div id="cartItems" style="max-height: 400px; overflow-y: auto;">
                        <div class="text-center py-4 text-muted" id="emptyCartMsg">
                            <i class="fas fa-receipt fa-3x mb-2 opacity-25"></i>
                            <p>Chưa có món nào</p>
                        </div>
                    </div>

                    <hr class="my-3">

                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <span class="text-muted">Tổng cộng:</span>
                        <h5 class="mb-0 fw-bold text-danger"><span id="total">0</span> <small>đ</small></h5>
                    </div>

                    <button class="btn btn-checkout text-white w-100"
                            th:onclick="checkout([[${customer.id}]])">
                        ĐẶT MÓN NGAY
                    </button>
                </div>

                <div class="card p-3 mt-4 shadow-sm border-0 rounded-4">
                    <div class="d-flex align-items-center mb-3">
                        <i class="fas fa-chair text-primary me-2"></i>
                        <h5 class="mb-0 fw-bold">Bàn trống</h5>
                    </div>

                    <div class="d-flex flex-wrap gap-2">
                        <div class="table-item border rounded-4 p-2 text-center bg-white shadow-sm"
                             style="width: calc(33.33% - 6px);"
                             th:each="t : ${tables}">
                            <div class="fw-bold text-primary" th:text="${t.tableNum}"></div>
                            <div style="font-size: 0.7rem;" class="text-muted">
                                <i class="fas fa-user-friends me-1"></i><span th:text="${t.capacity}"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let cart = [];

        function formatMoney(amount) {
            return amount.toLocaleString('vi-VN');
        }

        function updateInputQty(inputId, change) {
            let input = document.getElementById(inputId);
            let val = parseInt(input.value) || 1;
            let newVal = val + change;
            if (newVal >= 1) input.value = newVal;
        }

        function addToCart(id, price, name) {
            let qty = parseInt(document.getElementById('qty-' + id).value) || 1;
            let item = cart.find(i => i.id === id);
            if (item) {
                item.quantity += qty;
            } else {
                cart.push({ id, name, price, quantity: qty });
            }
            renderCart();
        }

        function removeFromCart(id) {
            id = parseInt(id);
            cart = cart.filter(i => i.id !== id);
            renderCart();
        }

        function renderCart() {
            let html = "";
            let total = 0;

            if (cart.length === 0) {
                document.getElementById("cartItems").innerHTML =
                    `<div class="text-center py-4 text-muted">
                        <i class="fas fa-receipt fa-3x mb-2 opacity-25"></i>
                        <p>Chưa có món nào</p>
                    </div>`;
                document.getElementById("total").innerText = 0;
                return;
            }

            cart.forEach(i => {
                let itemTotal = i.price * i.quantity;
                total += itemTotal;

                html += `
                <div class="cart-item d-flex align-items-center justify-content-between">
                    <div style="width: 50%">
                        <div class="fw-bold small text-truncate">${i.name}</div>
                        <div class="text-muted small">${formatMoney(i.price)} x ${i.quantity}</div>
                    </div>
                    <div class="text-danger fw-bold small text-end" style="width: 35%">
                        ${formatMoney(itemTotal)}đ
                    </div>
                    <div style="width: 15%" class="text-end">
                        <button onclick="removeFromCart(${i.id})" class="btn btn-sm text-muted p-0">
                            <i class="fas fa-times-circle"></i>
                        </button>
                    </div>
                </div>
                `;
            });

            document.getElementById("cartItems").innerHTML = html;
            document.getElementById("total").innerText = formatMoney(total);
        }

        function checkout(customerId) {
            if (cart.length === 0) {
                alert("Vui lòng chọn món trước khi thanh toán!");
                return;
            }

            fetch("/customer/order/create/" + customerId, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(cart)
            })
                .then(res => {
                    if (res.ok) {
                        alert("🎉 Đơn hàng của bạn đã được gửi đi thành công!");
                        cart = [];
                        renderCart();
                    }
                });
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>
    <script>
        let socket = new WebSocket(`ws://${location.host}/ws`);
        let stompClient = Stomp.over(socket);
        stompClient.debug = null;
        stompClient.connect({}, function () {
            stompClient.subscribe('/topic/tables', function () { location.reload(); });
            stompClient.subscribe('/topic/food', function () { location.reload(); });
        });
    </script>
</div>
</html>
