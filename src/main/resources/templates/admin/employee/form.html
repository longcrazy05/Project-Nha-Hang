<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout/main :: layout(~{::content}, 'Employee Form')">

<div th:fragment="content">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        .form-container {
            border: none;
            border-radius: 15px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.05);
            background-color: #ffffff;
        }
        .form-label {
            font-weight: 600;
            color: #495057;
            font-size: 0.9rem;
        }
        .input-group-text {
            background-color: #f8f9fa;
            border-right: none;
            color: #6c757d;
        }
        .form-control {
            border-left: none;
            padding: 10px 12px;
            border-radius: 0 8px 8px 0;
        }
        .form-control:focus {
            box-shadow: none;
            border-color: #dee2e6;
        }
        .input-group:focus-within .input-group-text,
        .input-group:focus-within .form-control {
            border-color: #4e73df;
            background-color: #fff;
        }
        .section-header {
            font-size: 1rem;
            color: #4e73df;
            border-bottom: 2px solid #f8f9fa;
            padding-bottom: 8px;
            margin-bottom: 20px;
        }
        .btn-save {
            background: linear-gradient(135deg, #2dce89 0%, #2dcecc 100%);
            border: none;
            color: white;
            padding: 10px 30px;
            font-weight: 600;
            border-radius: 8px;
            transition: all 0.3s;
        }
        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(45, 206, 137, 0.3);
        }
        .btn-cancel {
            border-radius: 8px;
            padding: 10px 25px;
        }
    </style>

    <div class="container py-4">
        <div class="card form-container p-4 p-md-5">

            <div class="d-flex align-items-center mb-5">
                <div class="bg-primary text-white rounded-3 p-3 me-3">
                    <i th:class="${emp.id == null ? 'fas fa-user-plus fa-lg' : 'fas fa-user-edit fa-lg'}"></i>
                </div>
                <div>
                    <h3 class="mb-0 fw-bold text-dark"
                        th:text="${emp.id} == null ? 'Add New Employee' : 'Edit Employee Profile'">
                    </h3>
                    <p class="text-muted mb-0 small">Vui lòng điền đầy đủ thông tin nhân sự bên dưới.</p>
                </div>
            </div>

            <form th:action="@{/admin/employees/save}"
                  th:object="${emp}"
                  method="post"
                  enctype="multipart/form-data">

                <input type="hidden" th:field="*{id}"/>

                <div class="row g-4">

                    <div class="col-md-6">
                        <h6 class="section-header fw-bold text-uppercase">
                            <i class="fas fa-id-card me-2"></i>Personal Info
                        </h6>

                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-user"></i></span>
                                <input class="form-control" type="text" th:field="*{name}" placeholder="Nguyen Van A" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Phone Number</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-phone"></i></span>
                                <input class="form-control" type="text" th:field="*{phone}" placeholder="090..." required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                                <input class="form-control" type="email" th:field="*{email}" placeholder="name@company.com" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Department</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-building"></i></span>
                                <input class="form-control" type="text" th:field="*{department}" placeholder="Kế toán, Nhân sự..." required>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <h6 class="section-header fw-bold text-uppercase">
                            <i class="fas fa-shield-alt me-2"></i>Account & Finance
                        </h6>

                        <div class="mb-3">
                            <label class="form-label">Salary (VND)</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-wallet"></i></span>
                                <input class="form-control" type="number" th:field="*{salary}" placeholder="8,000,000" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-at"></i></span>
                                <input class="form-control" type="text" th:field="*{username}" placeholder="nvana_admin" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-key"></i></span>
                                <input class="form-control" type="text" th:field="*{password}" placeholder="********" required>
                            </div>
                        </div>
                    </div>

                </div>

                <div class="alert alert-danger d-flex align-items-center mt-4 border-0 shadow-sm"
                     th:if="${error}">
                    <i class="fas fa-exclamation-circle me-2"></i>
                    <span th:text="${error}"></span>
                </div>

                <div class="mt-5 d-flex justify-content-end gap-2 border-top pt-4">
                    <a class="btn btn-light btn-cancel text-muted fw-bold" th:href="@{/admin/employees}">
                        Huỷ bỏ
                    </a>
                    <button class="btn btn-save shadow-sm" type="submit">
                        <i class="fas fa-save me-2"></i>Lưu thông tin
                    </button>
                </div>

            </form>
        </div>
    </div>
</div>
</html>
