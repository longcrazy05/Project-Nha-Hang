<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout/main :: layout(~{::content}, 'Employee Form')">

<div th:fragment="content">

    <div class="card p-4">

        <!-- Title -->
        <h4 class="mb-4 fw-bold"
            th:text="${emp.id} == null ? '➕ Add Employee' : '✏️ Edit Employee'">
        </h4>

        <form th:action="@{/admin/employees/save}"
              th:object="${emp}"
              method="post"
              enctype="multipart/form-data">

            <input type="hidden" th:field="*{id}"/>

            <div class="row">

                <!-- LEFT -->
                <div class="col-md-6">

                    <div class="mb-3">
                        <label class="form-label">Name</label>
                        <input class="form-control"
                               type="text"
                               th:field="*{name}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Phone</label>
                        <input class="form-control"
                               type="text"
                               th:field="*{phone}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input class="form-control"
                               type="email"
                               th:field="*{email}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Department</label>
                        <input class="form-control"
                               type="text"
                               th:field="*{department}" required>
                    </div>

                </div>

                <!-- RIGHT -->
                <div class="col-md-6">

                    <div class="mb-3">
                        <label class="form-label">Salary</label>
                        <input class="form-control"
                               type="number"
                               th:field="*{salary}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input class="form-control"
                               type="text"
                               th:field="*{username}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input class="form-control"
                               type="text"

                               th:field="*{password}" required>
                    </div>

                </div>

            </div>

            <!-- Error -->
            <div class="alert alert-danger"
                 th:if="${error}"
                 th:text="${error}">
            </div>

            <!-- Actions -->
            <div class="mt-3">

                <button class="btn btn-success px-4" type="submit">
                    💾 Save
                </button>

                <a class="btn btn-secondary ms-2"
                   th:href="@{/admin/employees}">
                    Cancel
                </a>

            </div>

        </form>

    </div>

</div>
</html>
