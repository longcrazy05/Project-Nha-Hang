<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout/main :: layout(~{::content}, 'Employee List')">

<div th:fragment="content">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">👨‍💼 Employee List</h2>

        <a class="btn btn-primary px-3"
           th:href="@{/admin/employees/create}">
            + Add Employee
        </a>
    </div>

    <!-- Table Card -->
    <div class="card p-3">

        <div class="table-responsive">
            <table class="table table-hover align-middle">

                <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Department</th>
                    <th>Salary</th>
                    <th>Username</th>
                    <th>Password</th>
                    <th width="180">Actions</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="emp : ${employees}">

                    <td th:text="${emp.id}"></td>

                    <td class="fw-semibold"
                        th:text="${emp.name}"></td>

                    <td th:text="${emp.email}"></td>

                    <td th:text="${emp.phone}"></td>

                    <td>
                        <span class="badge bg-secondary"
                              th:text="${emp.department}"></span>
                    </td>

                    <td class="text-success fw-semibold"
                        th:text="${emp.salary}"></td>

                    <td th:text="${emp.username}"></td>

                    <!-- PASSWORD COLUMN -->
                    <td>
                        <div class="d-flex align-items-center">

                            <span class="me-2 password-text fixed-password"
                                  th:data-password="${emp.password}">
                                ••••••••
                            </span>

                            <button type="button"
                                    class="btn btn-sm btn-outline-secondary toggle-password">
                                👁
                            </button>

                        </div>
                    </td>

                    <!-- ACTIONS -->
                    <td>

                        <a class="btn btn-sm btn-warning me-1"
                           th:href="@{/admin/employees/edit/{id}(id=${emp.id})}">
                            ✏️ Edit
                        </a>

                        <form th:action="@{/admin/employees/delete/{id}(id=${emp.id})}"
                              method="post"
                              style="display:inline"
                              th:onsubmit="return confirm('Delete employee:\n'
                                + 'Name: [[${emp.name}]]\n'
                                + 'Phone: [[${emp.phone}]]\n'
                                + 'Department: [[${emp.department}]]\n'
                                + 'Salary: [[${emp.salary}]]\n\n'
                                + 'Are you sure?')">

                            <button class="btn btn-sm btn-danger" type="submit">
                                🗑 Delete
                            </button>
                        </form>

                    </td>

                </tr>
                </tbody>

            </table>
        </div>

    </div>
    <style>
        .fixed-password {
            display: inline-block;
            min-width: 120px; /* 👉 chỉnh tùy ý */
            font-family: monospace; /* giữ độ rộng ký tự đều */
        }
    </style>
    <!-- SCRIPT SHOW/HIDE PASSWORD -->
    <script>
        document.querySelectorAll('.toggle-password').forEach(btn => {

            btn.addEventListener('click', function () {

                const span = this.parentElement.querySelector('.password-text');
                const realPass = span.getAttribute('data-password');

                if (span.textContent === '••••••••') {
                    span.textContent = realPass;
                    this.textContent = '🙈';
                } else {
                    span.textContent = '••••••••';
                    this.textContent = '👁';
                }

            });

        });
    </script>
    <!-- WebSocket auto reload -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>

    <script>
        let socket = new WebSocket(`ws://${location.host}/ws`);
        let stompClient = Stomp.over(socket);

        stompClient.connect({}, function () {

            stompClient.subscribe('/topic/employee', function () {
                location.reload();
            });
        });

    </script>
</div>
</html>
