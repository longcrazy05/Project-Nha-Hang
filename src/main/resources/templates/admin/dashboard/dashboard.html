<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout/main :: layout(~{::content}, 'Dashboard')">

<div th:fragment="content">

    <h2 class="mb-4 fw-bold">📊 Admin Dashboard</h2>

    <div class="row g-4 mb-4">

        <div class="row g-4 mb-4">

            <!-- Today -->
            <div class="col-md-3">
                <div class="card p-4">
                    <h6 class="text-muted mb-2" th:text="'Today ('+${today}+')'"></h6>
                    <h4 class="fw-bold text-success" th:text="${todayRevenue} + ' VND'"></h4>
                    <p class="mb-0 text-muted" th:text="${todayQuantityOrder} + ' Orders'"></p>
                </div>
            </div>

            <!-- Month -->
            <div class="col-md-3">
                <div class="card p-4">
                    <h6 class="text-muted mb-2">This Month</h6>
                    <h4 class="fw-bold text-primary" th:text="${monthRevenue} + ' VND'"></h4>
                    <p class="mb-0 text-muted"
                       th:text="${monthQuantityOrder==null ? 0: monthQuantityOrder} + ' Orders'">
                    </p>
                </div>
            </div>

            <!-- Total Tables -->
            <div class="col-md-3">
                <div class="card p-4">
                    <h6 class="text-muted mb-2">🪑 Total Tables</h6>
                    <h3 class="fw-bold text-dark"
                        th:text="${totalTables}">
                    </h3>
                    <p class="mb-0 text-muted">Restaurant Tables</p>
                </div>
            </div>

            <!-- Using Tables -->
            <div class="col-md-3">
                <div class="card p-4">
                    <h6 class="text-muted mb-2">🔥 Using Tables</h6>
                    <h3 class="fw-bold text-danger"
                        th:text="${usingTables}">
                    </h3>
                    <p class="mb-0 text-muted">Currently Occupied</p>
                </div>
            </div>

        </div>

    </div>

    <!-- Chart -->
    <div class="card p-4">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="mb-0">📈 Revenue by Month</h5>

            <form method="get" th:action="@{/admin/dashboard}">
                <select name="year"
                        class="form-select"
                        onchange="this.form.submit()">

                    <option th:each="y : ${years}"
                            th:value="${y}"
                            th:text="${y}"
                            th:selected="${y == selectedYear}">
                    </option>
                </select>
            </form>
        </div>

        <canvas id="revenueChart" style="max-height:400px;"></canvas>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script th:inline="javascript">
        const labels = [[${labels}]];
        const revenueData = [[${values}]];
        const orderData = [[${orders}]];

        new Chart(document.getElementById('revenueChart'), {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: 'Revenue',
                        data: revenueData,
                        backgroundColor: 'rgba(54, 162, 235, 0.7)',
                        yAxisID: 'y'
                    },
                    {
                        label: 'Orders',
                        data: orderData,
                        backgroundColor: 'rgba(255, 99, 132, 0.7)',
                        yAxisID: 'y1'
                    }
                ]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { position: 'top' }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        position: 'left'
                    },
                    y1: {
                        beginAtZero: true,
                        position: 'right',
                        grid: { drawOnChartArea: false }
                    }
                }
            }
        });
    </script>

    <!-- WebSocket auto reload -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>

    <script>
        let socket = new WebSocket(`ws://${location.host}/ws`);
        let stompClient = Stomp.over(socket);

        stompClient.connect({}, function () {
            stompClient.subscribe('/topic/dashboard', function () {
                location.reload();
            });
            stompClient.subscribe('/topic/tables', function () {
                location.reload();
            });
            stompClient.subscribe('/topic/revenue', function () {
                location.reload();
            });
            stompClient.subscribe('/topic/employee', function () {
                location.reload();
            });
        });

    </script>

</div>
</html>
