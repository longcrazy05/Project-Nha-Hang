<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout/main :: layout(~{::content}, 'Food List')">

<div th:fragment="content">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">🍜 Food Management</h2>

        <a class="btn btn-primary px-3"
           th:href="@{/admin/foods/create}">
            + Add Food
        </a>
    </div>

    <!-- Table Card -->
    <div class="card p-3">

        <div class="table-responsive">
            <table class="table table-hover align-middle fixed-table">

                <thead class="table-light">
                <tr>
                    <th style="width: 60px;">ID</th>
                    <th style="width: 180px;">Name</th>
                    <th style="width: 120px;">Image</th>
                    <th style="width: 140px;">Price</th>
                    <th style="width: 160px;">Status</th>
                    <th style="width: 200px;">Actions</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="food : ${foods}">

                    <td th:text="${food.id}"></td>

                    <td class="fw-semibold"
                        th:text="${food.name}"></td>

                    <!-- IMAGE -->
                    <td>
                        <img th:if="${food.image_url != null}"
                             th:src="@{'/images/' + ${food.image_url}}"
                             class="food-img">
                    </td>

                    <!-- PRICE -->
                    <td class="text-success fw-bold"
                        th:text="${food.price} + ' VND'"></td>

                    <!-- STATUS -->
                    <td>
                        <span class="badge w-100"
                              th:classappend="${food.available} ? 'bg-success' : 'bg-secondary'"
                              th:text="${food.available ? '🟢 Available' : '⚪ Unavailable'}">
                        </span>
                    </td>

                    <!-- ACTIONS -->
                    <td>

                        <a class="btn btn-sm btn-warning me-1"
                           th:href="@{/admin/foods/edit/{id}(id=${food.id})}">
                            ✏️ Edit
                        </a>

                        <a class="btn btn-sm btn-outline-primary"
                           th:href="@{/admin/foods/toggle/{id}(id=${food.id})}">
                            🔄 Toggle
                        </a>

                    </td>

                </tr>
                </tbody>

            </table>
        </div>

    </div>

    <!-- CSS -->
    <style>
        .fixed-table {
            table-layout: fixed;
            width: 100%;
        }

        .fixed-table th,
        .fixed-table td {
            text-align: center;
            vertical-align: middle;
            padding: 12px;
        }

        .food-img {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }
    </style>
    <!-- WebSocket auto reload -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>

    <script>
        let socket = new WebSocket(`ws://${location.host}/ws`);
        let stompClient = Stomp.over(socket);

        stompClient.connect({}, function () {
            stompClient.subscribe('/topic/food', function () {
                location.reload();
            });

        });

    </script>
</div>
</html>
