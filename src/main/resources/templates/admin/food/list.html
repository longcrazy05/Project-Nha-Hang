<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout/main :: layout(~{::content}, 'Food List')">

<div th:fragment="content">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        .table-card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            background: #fff;
            overflow: hidden;
        }
        .table thead th {
            background-color: #f8f9fa;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
            font-weight: 700;
            color: #6c757d;
            border: none;
            padding: 15px;
            text-align: center;
        }
        .table tbody td {
            padding: 15px;
            vertical-align: middle;
            text-align: center;
            border-color: #f1f3f5;
        }
        .food-img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 12px;
            transition: transform 0.3s ease;
        }
        .food-img:hover {
            transform: scale(1.1);
        }
        /* Trạng thái Soft Badge */
        .status-badge {
            padding: 6px 12px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.85rem;
            display: inline-block;
            min-width: 110px;
        }
        .status-available {
            background-color: #e6fffa;
            color: #047481;
        }
        .status-unavailable {
            background-color: #fff5f5;
            color: #c53030;
        }
        /* Buttons */
        .btn-action {
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-add {
            background: linear-gradient(135deg, #4e73df 0%, #224abe 100%);
            border: none;
            border-radius: 10px;
        }
        .price-text {
            color: #2dce89;
            font-weight: 700;
        }
    </style>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold mb-1 text-dark">🍜 Menu Management</h2>
            <p class="text-muted small mb-0">Manage your dishes, prices, and availability.</p>
        </div>

        <a class="btn btn-primary btn-add px-4 py-2 shadow-sm"
           th:href="@{/admin/foods/create}">
            <i class="fas fa-plus me-2"></i>Add New Food
        </a>
    </div>

    <div class="card table-card">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead>
                <tr>
                    <th style="width: 80px;">ID</th>
                    <th style="text-align: left;">Dish Name</th>
                    <th>Image</th>
                    <th>Price</th>
                    <th>Status</th>
                    <th style="width: 220px;">Actions</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="food : ${foods}">
                    <td class="text-muted fw-bold" th:text="'#' + ${food.id}"></td>

                    <td style="text-align: left;">
                        <span class="fw-bold text-dark fs-6" th:text="${food.name}"></span>
                    </td>

                    <td>
                        <div class="d-flex justify-content-center">
                            <img th:if="${food.image_url != null}"
                                 th:src="@{'/images/' + ${food.image_url}}"
                                 class="food-img shadow-sm border">
                            <div th:if="${food.image_url == null}"
                                 class="food-img bg-light d-flex align-items-center justify-content-center text-muted border">
                                <i class="fas fa-image"></i>
                            </div>
                        </div>
                    </td>

                    <td>
                        <span class="price-text"
                              th:text="${#numbers.formatDecimal(food.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'">
                        </span>
                    </td>

                    <td>
                        <span class="status-badge"
                              th:classappend="${food.available} ? 'status-available' : 'status-unavailable'">
                            <i th:class="${food.available} ? 'fas fa-check-circle me-1' : 'fas fa-times-circle me-1'"></i>
                            <span th:text="${food.available ? 'Available' : 'Sold Out'}"></span>
                        </span>
                    </td>

                    <td>
                        <div class="d-flex justify-content-center gap-2">
                            <a class="btn btn-sm btn-outline-warning btn-action"
                               th:href="@{/admin/foods/edit/{id}(id=${food.id})}" title="Edit">
                                <i class="fas fa-edit"></i> Edit
                            </a>

                            <a class="btn btn-sm btn-action"
                               th:classappend="${food.available} ? 'btn-outline-secondary' : 'btn-outline-success'"
                               th:href="@{/admin/foods/toggle/{id}(id=${food.id})}">
                                <i class="fas fa-sync-alt"></i> Toggle
                            </a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>

    <script>
        let socket = new WebSocket(`ws://${location.host}/ws`);
        let stompClient = Stomp.over(socket);
        stompClient.debug = null; // Tắt debug console cho sạch

        stompClient.connect({}, function () {
            stompClient.subscribe('/topic/food', function () {
                location.reload();
            });
        });
    </script>
</div>
</html>
