<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout/main :: layout(~{::content}, 'Food Form')">

<div th:fragment="content">

  <div class="card" style="margin-top: 70px">
    <div class="card-header">
      <h4 th:text="${food.id} == null ? 'Add Food' : 'Edit Food'"></h4>
    </div>
    <div class="card-body">

      <form th:action="@{/foods/save}" th:object="${food}" method="post" enctype="multipart/form-data">

        <input type="hidden" th:field="*{id}"/>
        <input type="hidden" th:field="*{image_url}">
        <div class="mb-3">
          <label class="form-label">Name</label>
          <input class="form-control" type="text" th:field="*{name}" required>
        </div>
        <div class="mb-3" th:if="${food.image_url != null}">
          <label class="form-label">Current Image</label><br>
          <img th:src="@{'/images/' + ${food.image_url}}"
               style="width:120px; height:120px; object-fit:cover;">
        </div>
        <div class="mb-3">
          <label class="form-label">Upload Image</label>
          <input class="form-control" type="file" name="image">
        </div>
<!--        <div class="mb-3">-->
<!--          <label class="form-label">Image file name</label>-->
<!--          <input class="form-control"-->
<!--                 type="text"-->
<!--                 th:field="*{image_url}"-->
<!--                 placeholder="vd: pho_bo.jpg">-->
<!--        </div>-->

        <div class="mb-3">
          <label class="form-label">Price</label>
          <input class="form-control" type="number"
                 th:field="*{price}" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Category</label>
          <input class="form-control" type="text"
                 th:field="*{category}" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Description</label>
          <input class="form-control" type="text"
                 th:field="*{description}" required>
        </div>
        <div class="form-check mb-3">
          <input class="form-check-input"
                 type="checkbox"
                 th:field="*{available}">
          <label class="form-check-label">
            Available
          </label>
        </div>

        <button class="btn btn-success" type="submit">
          Save
        </button>
        <a class="btn btn-secondary" th:href="@{/foods}">
          Cancel
        </a>

      </form>

    </div>
  </div>

</div>
</html>
