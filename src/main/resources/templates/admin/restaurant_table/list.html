<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout/main :: layout(~{::content}, 'Table List')">

<div th:fragment="content">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        .table-card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            background: #fff;
            overflow: hidden;
        }
        .table thead th {
            background-color: #f8f9fa;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
            font-weight: 700;
            color: #6c757d;
            border: none;
            padding: 15px;
        }
        .table tbody td {
            padding: 15px;
            vertical-align: middle;
            border-color: #f1f3f5;
        }
        /* Soft Badges */
        .status-badge {
            padding: 6px 12px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.85rem;
            display: inline-block;
            min-width: 120px;
        }
        .status-available {
            background-color: #e6fffa;
            color: #047481;
        }
        .status-unavailable {
            background-color: #fff5f5;
            color: #c53030;
        }
        .capacity-badge {
            background-color: #e8f0fe;
            color: #1967d2;
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: 500;
        }
        /* Buttons */
        .btn-action {
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-add {
            background: linear-gradient(135deg, #4e73df 0%, #224abe 100%);
            border: none;
            border-radius: 10px;
        }
        .table-num {
            font-size: 1.1rem;
            color: #4e73df;
        }
    </style>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold text-dark mb-1">🍽 Table Management</h2>
            <p class="text-muted small mb-0">Quản lý sơ đồ bàn, sức chứa và trạng thái phục vụ.</p>
        </div>

        <a class="btn btn-primary btn-add px-4 py-2 shadow-sm"
           th:href="@{/admin/tables/create}">
            <i class="fas fa-plus me-2"></i>Add New Table
        </a>
    </div>

    <div class="card table-card">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0 text-center">
                <thead>
                <tr>
                    <th style="width: 80px;">ID</th>
                    <th>Table Number</th>
                    <th>Capacity</th>
                    <th>Status</th>
                    <th style="width: 250px;">Actions</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="table : ${tables}">
                    <td class="text-muted fw-bold" th:text="'#' + ${table.id}"></td>

                    <td>
                        <div class="d-flex align-items-center justify-content-center">
                            <i class="fas fa-chair me-2 text-muted"></i>
                            <span class="fw-bold table-num" th:text="${table.tableNum}"></span>
                        </div>
                    </td>

                    <td>
                        <span class="capacity-badge">
                            <i class="fas fa-users me-1 small"></i>
                            <span th:text="${table.capacity} + ' seats'"></span>
                        </span>
                    </td>

                    <td>
                        <span class="status-badge"
                              th:classappend="${table.available} ? 'status-available' : 'status-unavailable'">
                            <i th:class="${table.available} ? 'fas fa-check-circle me-1' : 'fas fa-times-circle me-1'"></i>
                            <span th:text="${table.available ? 'Available' : 'Unavailable'}"></span>
                        </span>
                    </td>

                    <td>
                        <div class="d-flex justify-content-center gap-2">
                            <a class="btn btn-sm btn-outline-warning btn-action px-3"
                               th:href="@{/admin/tables/edit/{id}(id=${table.id})}">
                                <i class="fas fa-edit me-1"></i> Edit
                            </a>

                            <a class="btn btn-sm btn-action px-3"
                               th:classappend="${table.available} ? 'btn-outline-secondary' : 'btn-outline-success'"
                               th:href="@{/admin/tables/toggle/{id}(id=${table.id})}">
                                <i class="fas fa-sync-alt me-1"></i> Toggle
                            </a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>

    <script>
        let socket = new WebSocket(`ws://${location.host}/ws`);
        let stompClient = Stomp.over(socket);
        stompClient.debug = null; // Tắt log console cho sạch giao diện

        stompClient.connect({}, function () {
            stompClient.subscribe('/topic/tables', function () {
                location.reload();
            });
        });
    </script>
</div>
</html>
