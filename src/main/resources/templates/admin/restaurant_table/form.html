<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout/main :: layout(~{::content}, 'Table Form')">

<div th:fragment="content">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        .form-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            background: #fff;
            max-width: 800px;
            margin: 0 auto;
        }
        .form-label {
            font-weight: 600;
            color: #495057;
            margin-bottom: 8px;
        }
        .input-group-text {
            background-color: #f8f9fa;
            border-right: none;
            color: #6c757d;
            border-radius: 12px 0 0 12px;
        }
        .form-control {
            border-left: none;
            padding: 12px 15px;
            border-radius: 0 12px 12px 0;
            transition: all 0.3s;
        }
        .form-control:focus {
            box-shadow: none;
            border-color: #dee2e6;
        }
        /* Hiệu ứng khi click vào input */
        .input-group:focus-within .input-group-text,
        .input-group:focus-within .form-control {
            border-color: #4e73df;
            background-color: #fff;
        }
        /* Hộp trạng thái */
        .status-box {
            background-color: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #edf2f7;
            transition: all 0.3s;
        }
        .form-switch .form-check-input {
            width: 2.8em;
            height: 1.4em;
            cursor: pointer;
        }
        /* Nút bấm */
        .btn-save {
            background: linear-gradient(135deg, #2dce89 0%, #2dccae 100%);
            border: none;
            color: white;
            padding: 12px 30px;
            font-weight: 600;
            border-radius: 10px;
            transition: all 0.3s;
        }
        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(45, 206, 137, 0.3);
        }
        .btn-cancel {
            border-radius: 10px;
            padding: 12px 25px;
            font-weight: 500;
        }
    </style>

    <div class="container py-5">
        <div class="card form-card p-4 p-md-5">

            <div class="text-center mb-5">
                <div class="bg-light d-inline-block p-3 rounded-circle mb-3">
                    <i th:class="${table.id == null ? 'fas fa-plus fa-2x text-primary' : 'fas fa-edit fa-2x text-warning'}"></i>
                </div>
                <h3 class="fw-bold text-dark"
                    th:text="${table.id} == null ? 'Add New Table' : 'Edit Table Information'">
                </h3>
                <p class="text-muted">Quản lý sơ đồ bàn và sức chứa của nhà hàng.</p>
            </div>

            <form th:action="@{/admin/tables/save}"
                  th:object="${table}"
                  method="post">

                <input type="hidden" th:field="*{id}"/>

                <div class="row g-4">
                    <div class="col-md-6">
                        <label class="form-label">Table Number / Name</label>
                        <div class="input-group shadow-sm">
                            <span class="input-group-text"><i class="fas fa-hashtag"></i></span>
                            <input class="form-control"
                                   type="text"
                                   th:field="*{tableNum}"
                                   placeholder="Ví dụ: A01, VIP-01"
                                   required>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Max Capacity</label>
                        <div class="input-group shadow-sm">
                            <span class="input-group-text"><i class="fas fa-users"></i></span>
                            <input class="form-control"
                                   type="number"
                                   th:field="*{capacity}"
                                   placeholder="Số chỗ ngồi"
                                   min="1"
                                   required>
                        </div>
                    </div>

                    <div class="col-12 mt-4">
                        <div class="status-box d-flex justify-content-between align-items-center shadow-sm">
                            <div>
                                <h6 class="mb-0 fw-bold text-dark">Trạng thái hoạt động</h6>
                                <small class="text-muted">Bàn có sẵn để khách đặt hoặc phục vụ hay không.</small>
                            </div>
                            <div class="form-check form-switch p-0 m-0">
                                <input class="form-check-input"
                                       type="checkbox"
                                       role="switch"
                                       th:field="*{available}"
                                       id="availableSwitch">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mt-5 d-flex justify-content-center gap-3">
                    <a class="btn btn-light btn-cancel text-muted" th:href="@{/admin/tables}">
                        Huỷ bỏ
                    </a>
                    <button class="btn btn-save shadow-sm" type="submit">
                        <i class="fas fa-save me-2"></i>Lưu thông tin bàn
                    </button>
                </div>

            </form>

        </div>
    </div>
</div>
</html>
