<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout/staff :: layout(~{::content}, 'Danh sách đặt trước')">

<div th:fragment="content">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold">📅 Danh sách đặt trước</h3>

    </div>


    <!-- TABLE -->
    <div class="card p-3">

        <div class="table-responsive">

            <table class="table table-hover align-middle">

                <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>Khách hàng</th>
                    <th>SĐT</th>
                    <th>Số lượng</th>
                    <th>Thời gian</th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="reservation : ${reservations}">

                    <td th:text="${reservation.id}"></td>

                    <td class="fw-semibold"
                        th:text="${reservation.customer.name}">
                    </td>

                    <td th:text="${reservation.customer.phone}"></td>


                    <!-- GUEST COUNT -->
                    <td>

<span class="badge bg-info text-dark"
      th:text="${reservation.guestCount} + ' người'">
</span>

                    </td>


                    <!-- TIME -->
                    <td>

<span class="text-muted"
      th:text="${#temporals.format(reservation.reservationTime,
      'dd-MM-yyyy HH:mm')}">
</span>

                    </td>

                </tr>


                <tr th:if="${#lists.isEmpty(reservations)}">

                    <td colspan="5"
                        class="text-center text-muted py-4">

                        Không có dữ liệu

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</html>
