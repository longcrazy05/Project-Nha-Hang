<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout/staff :: layout(~{::content}, 'Danh sách Order')">

<div th:fragment="content">

    <h3 class="fw-bold mb-4">🧾 Danh sách Order</h3>

    <!-- FILTER -->
    <div class="card p-3 mb-4">

        <form method="get"
              th:action="@{/staff/orders}"
              class="row g-3 align-items-center">

            <div class="col-md-3">
                <input type="date"
                       name="date"
                       th:value="${selectedDate}"
                       class="form-control">
            </div>

            <div class="col-md-auto">
                <button class="btn btn-primary">
                    🔍 Tìm
                </button>
            </div>

            <div class="col-md-auto">
                <a th:href="@{/staff/orders/create}"
                   class="btn btn-success">
                    + Tạo Order
                </a>
            </div>

        </form>

    </div>


    <!-- TABLE -->
    <div class="card p-3">

        <div class="table-responsive">

            <table class="table table-hover align-middle">

                <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>Khách hàng</th>
                    <th>Thời gian</th>
                    <th>Bàn</th>
                    <th>Tổng tiền</th>
                    <th>Thanh toán</th>
                    <th>Hành động</th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="order : ${orders}"
                    th:with="r=${order.reservation}">

                    <td th:text="${order.id}"></td>

                    <td class="fw-semibold"
                        th:text="${order.customer.name}">
                    </td>

                    <td th:text="${#temporals.format(order.openedAt,'dd-MM-yyyy HH:mm')}">
                    </td>

                    <!-- TABLE -->
                    <td>

<span class="badge bg-info text-dark">

<span th:if="${r == null}">
ONLINE
</span>

<span th:if="${r != null}"
      th:text="${r.table != null ? 'Bàn ' + r.table.tableNum : 'Mang đi'}">
</span>

</span>

                    </td>


                    <!-- TOTAL -->
                    <td class="text-success fw-bold">

<span th:if="${order.totalAmount == null}">
0 đ
</span>

                        <span th:if="${order.totalAmount != null}"
                              th:text="${#numbers.formatDecimal(order.totalAmount,0,'COMMA',0,'POINT')} + ' đ'">
</span>

                    </td>


                    <!-- PAYMENT -->
                    <td>

<span class="badge"
      th:classappend="${order.paidAt != null} ? 'bg-success' : 'bg-secondary'">

<span th:text="${order.paidAt != null ? 'Đã thanh toán' : 'Chưa thanh toán'}">
</span>

</span>

                    </td>


                    <!-- ACTION -->
                    <td>

                        <!-- DETAIL -->
                        <a th:href="@{/staff/order-items/{id}(id=${order.id},date=${selectedDate})}"
                           class="btn btn-sm btn-primary me-1">
                            Chi tiết
                        </a>


                        <!-- PAYMENT -->
                        <form th:action="@{/staff/orders/edit/{id}(id=${order.id})}"
                              method="get"
                              style="display:inline">

                            <button class="btn btn-sm btn-warning me-1"
                                    th:disabled="${order.paidAt != null}">
                                Thanh toán
                            </button>

                        </form>


                        <!-- DELETE -->
                        <form th:action="@{/staff/orders/delete/{id}(id=${order.id})}"
                              method="post"
                              style="display:inline-block"
                              onsubmit="return confirm('Bạn có chắc muốn xóa order này?');">

                            <input type="hidden"
                                   name="date"
                                   th:value="${selectedDate}" />

                            <button class="btn btn-sm btn-danger"
                                    th:disabled="${order.paidAt != null}">
                                Xóa
                            </button>

                        </form>

                    </td>

                </tr>


                <tr th:if="${#lists.isEmpty(orders)}">
                    <td colspan="7"
                        class="text-center text-muted py-4">
                        Không có order
                    </td>
                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</html>
