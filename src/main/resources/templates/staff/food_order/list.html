<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Danh sách Order</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<h3 class="mb-3">Danh sách Order</h3>

<!-- Tìm theo ngày -->
<form method="get" th:action="@{/staff/orders}" class="row g-2 mb-3">
    <div class="col-auto">
        <input type="date" name="date"
               th:value="${selectedDate}"
               class="form-control">
    </div>
    <div class="col-auto">
        <button type="submit" class="btn btn-primary">Tìm</button>
    </div>
    <div class="col-auto">
        <a th:href="@{/staff/orders/create}" class="btn btn-success">
            + Tạo Order
        </a>
    </div>
</form>

<!-- Bảng danh sách -->
<table class="table table-bordered table-hover">
    <thead class="table-dark">
    <tr>
        <th>ID</th>
        <th>Khách hàng</th>
        <th>Thời gian mở</th>
        <th>Bàn</th>
        <th>Tổng tiền</th>
        <th>Trạng thái thanh toán</th>
        <th>Chi tiết</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="order : ${orders}"
        th:with="table=${order.reservation.table}">
        <td th:text="${order.id}"></td>
        <td th:text="${order.customer.name}"></td>
        <td th:text="${#temporals.format(order.openedAt, 'dd-MM-yyyy HH:mm')}"></td>

        <td th:text="${table != null ? table.tableNum : 'Mang đi'}"></td>
        <td th:if="${order.totalAmount == null}" th:text="'0 đ'"></td>
        <td th:if="${order.totalAmount != null}"
                th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>

        <!-- Badge thanh toán -->
        <td>
            <span th:class="${order.paidAt != null}
                    ? 'badge bg-success'
                    : 'badge bg-secondary'">
                <span th:text="${order.paidAt != null ? 'Đã thanh toán' : 'Chưa thanh toán'}"></span>
            </span>
            <span th:if="${order.paidAt != null}"
                  th:text="${#temporals.format(order.paidAt, 'dd-MM-yyyy HH:mm')}"></span>
        </td>



        <td>
            <a th:href="@{/staff/orders/{id}(id=${order.id})}"
               class="btn btn-sm btn-primary">
                Xem
            </a>
            <a th:href="@{/staff/orders/edit/{id}(id=${order.id}, date=${selectedDate})}"
               class="btn btn-sm btn-warning">
                Chỉnh sửa
            </a>
        </td>
    </tr>

    <tr th:if="${#lists.isEmpty(orders)}">
        <td colspan="6" class="text-center text-muted">
            Không có order
        </td>
    </tr>

    </tbody>
</table>

</body>
</html>
