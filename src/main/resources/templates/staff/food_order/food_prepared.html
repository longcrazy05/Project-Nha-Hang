<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout/staff :: layout(~{::content}, 'Danh sách chờ')">

<div th:fragment="content">

    <h3 class="fw-bold mb-4">🍳 Danh sách chờ</h3>

    <div class="card p-3">

        <div class="table-responsive">

            <table class="table table-hover align-middle">

                <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>Khách</th>
                    <th>Bàn</th>
                    <th>Món</th>
                    <th>SL</th>
                    <th>Trạng thái</th>
                    <th>Hành động</th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="wait : ${waits}"
                    th:with="r=${wait.foodOrder.reservation}">

                    <td th:text="${wait.id}"></td>

                    <td class="fw-semibold"
                        th:text="${wait.foodOrder.customer.name}">
                    </td>

                    <!-- TABLE -->
                    <td>

<span class="badge bg-info text-dark">

<span th:if="${r == null}">
ONLINE
</span>

<span th:if="${r != null}"
      th:text="${r.table != null ? 'Bàn ' + r.table.tableNum : 'Mang đi'}">
</span>

</span>

                    </td>

                    <!-- FOOD -->
                    <td th:text="${wait.food.name}"></td>

                    <!-- QUANTITY -->
                    <td>
<span class="badge bg-secondary"
      th:text="${wait.quantity}">
</span>
                    </td>


                    <!-- STATUS -->
                    <td>

                        <!-- WAIT -->
                        <span class="badge bg-secondary"
                              th:if="${wait.cookingStartedAt == null
&& wait.cookingFinishedAt == null
&& wait.servedAt == null}">
⏳ Chờ nấu
</span>

                        <!-- COOKING -->
                        <span class="badge bg-warning text-dark"
                              th:if="${wait.cookingStartedAt != null
&& wait.cookingFinishedAt == null
&& wait.servedAt == null}">
🔥 Đang nấu
</span>

                        <!-- FINISHED -->
                        <span class="badge bg-info text-dark"
                              th:if="${wait.cookingStartedAt != null
&& wait.cookingFinishedAt != null
&& wait.servedAt == null}">
🍽 Nấu xong
</span>

                        <!-- SERVED -->
                        <span class="badge bg-success"
                              th:if="${wait.servedAt != null}">
✅ Đã phục vụ
</span>

                    </td>


                    <!-- ACTION -->
                    <td th:if="${wait.foodOrder.totalAmount != null}">

                        <!-- START -->
                        <a th:if="${wait.cookingStartedAt == null
&& wait.cookingFinishedAt == null}"

                           th:href="@{/staff/order-items/waiting/start/{id}(id=${wait.id})}"
                           class="btn btn-sm btn-warning me-1">

                            ▶ Start

                        </a>


                        <!-- FINISH -->
                        <a th:if="${wait.cookingStartedAt != null
&& wait.cookingFinishedAt == null}"

                           th:href="@{/staff/order-items/waiting/finish/{id}(id=${wait.id})}"
                           class="btn btn-sm btn-info me-1">

                            ✔ Finish

                        </a>


                        <!-- SERVE -->
                        <a th:if="${wait.cookingFinishedAt != null
&& wait.servedAt == null}"

                           th:href="@{/staff/order-items/waiting/serve/{id}(id=${wait.id})}"
                           class="btn btn-sm btn-success me-1">

                            🍽 Serve

                        </a>


                        <!-- DELETE -->
                        <a th:if="${wait.cookingStartedAt == null}"

                           th:href="@{/staff/order-items/waiting/delete/{id}(id=${wait.id})}"
                           class="btn btn-sm btn-danger">

                            🗑

                        </a>

                    </td>

                </tr>


                <tr th:if="${#lists.isEmpty(waits)}">

                    <td colspan="7"
                        class="text-center text-muted py-4">

                        Không có món chờ

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>


    <!-- REALTIME -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>

    <script>

        let socket = new WebSocket(`ws://${location.host}/ws`);
        let stompClient = Stomp.over(socket);

        stompClient.connect({}, function () {

        stompClient.subscribe('/topic/waiting', function () {
        location.reload();
        });

        });

    </script>

</div>

</html>
