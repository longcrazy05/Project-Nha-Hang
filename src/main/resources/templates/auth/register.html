<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Đăng ký tài khoản</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            background: #f8f9fa;
            font-family: 'Inter', sans-serif;
        }

        /* Style Card giống form Đăng nhập */
        .register-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08) !important;
        }

        /* Bo góc input */
        .form-control {
            border-radius: 8px;
            padding: 10px 15px;
        }

        .form-control:focus {
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.15);
        }

        .btn-register {
            border-radius: 8px;
            padding: 10px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* Tinh chỉnh text báo lỗi */
        .error-text {
            font-size: 0.85rem;
            margin-top: 5px;
        }
    </style>
</head>

<body>
<div class="container">
    <div class="row justify-content-center mt-5 pt-3 mb-5">
        <div class="col-md-7 col-lg-5">
            <div class="card p-4 shadow register-card">

                <h4 class="text-center mb-4 fw-bold text-primary">
                    Đăng ký khách hàng
                </h4>

                <form method="post" th:object="${customer}" action="/register">

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-medium text-secondary">Họ và tên</label>
                            <input name="name"
                                   class="form-control"
                                   placeholder="Nhập họ tên"
                                   th:value="${customer?.name}"
                                   required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-medium text-secondary">Số điện thoại</label>
                            <input type="tel"
                                   name="phone"
                                   th:value="${customer?.phone}"
                                   class="form-control"
                                   placeholder="Nhập SĐT"
                                   required>
                            <div class="text-danger error-text fw-medium"
                                 th:if="${phoneError}"
                                 th:text="${phoneError}">
                            </div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-medium text-secondary">Email</label>
                        <input type="email"
                               name="email"
                               th:value="${customer?.email}"
                               class="form-control"
                               placeholder="Nhập địa chỉ email"
                               required>
                        <div class="text-danger error-text fw-medium"
                             th:if="${emailError}"
                             th:text="${emailError}">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-medium text-secondary">Tên đăng nhập (Username)</label>
                        <input name="username"
                               th:value="${customer?.username}"
                               class="form-control"
                               placeholder="Tạo tên đăng nhập"
                               required>
                        <div class="text-danger error-text fw-medium"
                             th:if="${usernameError}"
                             th:text="${usernameError}">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-medium text-secondary">Mật khẩu</label>
                        <input type="password"
                               name="password"
                               class="form-control"
                               placeholder="Tạo mật khẩu"
                               required>
                    </div>

                    <button class="btn btn-primary w-100 btn-register mt-2">
                        Đăng ký ngay
                    </button>

                </form>

                <div class="text-center mt-4 pt-3 border-top text-secondary">
                    Đã có tài khoản?
                    <a href="/login" class="text-decoration-none fw-semibold">
                        Đăng nhập
                    </a>
                </div>

            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
