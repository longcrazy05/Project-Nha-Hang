<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Đăng nhập</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            background: #f8f9fa;
            font-family: 'Inter', sans-serif;
        }

        /* Tinh chỉnh lại Card đăng nhập cho hiện đại */
        .login-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08) !important;
        }

        /* Bo góc các input và nút bấm */
        .form-control {
            border-radius: 8px;
            padding: 10px 15px;
        }

        .form-control:focus {
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.15);
        }

        .btn-login {
            border-radius: 8px;
            padding: 10px;
            font-weight: 600;
        }
    </style>
</head>

<body>

<div class="position-fixed top-0 end-0 p-4" style="z-index: 1055;">
    <div class="alert alert-success alert-dismissible fade show shadow-lg"
         role="alert"
         id="successAlert"
         th:if="${success}">
        ✅ <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
</div>

<div class="container">
    <div class="row justify-content-center mt-5 pt-4">
        <div class="col-md-5 col-lg-4">
            <div class="card p-4 shadow login-card">
                <h4 class="text-center mb-4 fw-bold text-primary">
                    Đăng nhập
                </h4>

                <form method="post" action="/login">
                    <div class="mb-3">
                        <label class="form-label fw-medium text-secondary">Username</label>
                        <input name="username"
                               th:value="${username}"
                               class="form-control"
                               placeholder="Nhập tài khoản"
                               required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-medium text-secondary">Password</label>
                        <input type="password"
                               name="password"
                               class="form-control"
                               placeholder="Nhập mật khẩu"
                               required>
                    </div>

                    <div class="text-danger small mb-3 text-center fw-medium"
                         th:if="${error}"
                         th:text="${error}">
                    </div>

                    <button class="btn btn-primary w-100 mt-2 btn-login">
                        Đăng nhập
                    </button>
                </form>

                <div class="text-center mt-4 pt-3 border-top text-secondary">
                    Chưa có tài khoản?
                    <a href="/register" class="text-decoration-none fw-semibold">
                        Đăng ký ngay
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // Tự động đóng thông báo mượt mà sau 3 giây
    setTimeout(() => {
        const alertNode = document.getElementById('successAlert');
        if (alertNode) {
            // Sử dụng API của Bootstrap để đóng alert kèm theo hiệu ứng fade-out
            const alert = new bootstrap.Alert(alertNode);
            alert.close();
        }
    }, 3000);
</script>

</body>
</html>
